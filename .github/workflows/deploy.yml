name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy with auto-rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            cd /opt/google-ads-mcp

            CURRENT_COMMIT=$(git rev-parse HEAD)
            CURRENT_MSG=$(git log -1 --pretty=format:"%s")
            DEPLOY_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')

            echo "Starting update — current: $CURRENT_COMMIT"

            git pull origin main
            NEW_COMMIT=$(git rev-parse HEAD)
            NEW_MSG=$(git log -1 --pretty=format:"%s")

            if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ]; then
              echo "No new update"
              exit 0
            fi

            echo "New version: $NEW_COMMIT"
            /root/.local/bin/uv sync 2>&1

            TEST_PORT=3199
            /root/.local/bin/uv run main.py --groups core --transport streamable-http --host 0.0.0.0 --port $TEST_PORT > /tmp/mcp_test.log 2>&1 &
            TEST_PID=$!
            sleep 8

            HTTP_CODE=$(curl -s -o /tmp/mcp_resp.txt -w "%{http_code}" -X POST http://127.0.0.1:$TEST_PORT/mcp/ -H "Content-Type: application/json" -H "Accept: application/json, text/event-stream" -d '{"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1"}}}' --max-time 8 2>/dev/null || echo "000")

            kill $TEST_PID 2>/dev/null
            wait $TEST_PID 2>/dev/null

            if [ "$HTTP_CODE" = "200" ]; then
              systemctl restart google-ads-mcp
              rm -f /opt/google-ads-mcp/PENDING_UPDATE.md
              echo "Update successful — commit: $NEW_COMMIT"
            else
              git reset --hard "$CURRENT_COMMIT"
              /root/.local/bin/uv sync 2>&1

              python3 scripts/create_pending_update.py \
                "$CURRENT_COMMIT" "$CURRENT_MSG" \
                "$NEW_COMMIT" "$NEW_MSG" \
                "$DEPLOY_TIME" "$HTTP_CODE"

              echo "Update failed — rolled back to: $CURRENT_COMMIT"
              exit 1
            fi
